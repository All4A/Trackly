openapi: 3.0.0
info:
  title: Auth API
  version: 1.0.0
  description: API для регистрации и входа пользователей с использованием JWT

servers:
  - url: http://api.example.com/v1
    description: Production server

paths:
  /register:
    post:
      summary: Регистрация нового пользователя
      description: Регистрирует нового пользователя и возвращает статус "ok"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        '200':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        '400':
          description: Неверные данные для регистрации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '409':
          description: Пользователь с таким именем уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /login:
    post:
      summary: Вход пользователя
      description: Аутентифицирует пользователя и возвращает JWT токен
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        '400':
          description: Неверные данные для входа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '401':
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          example: user123
        password:
          type: string
          example: password123
      required:
        - username
        - password

    RegisterResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: user123
        password:
          type: string
          example: password123
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT токен для аутентификации
          example: "your.jwt.token"
      required:
        - token

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Invalid username or password"
      required:
        - error
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []