version: '3.7'

services:

  front:
    container_name: front
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3000:3000

  postgres-trackly-bd:
    image: postgres:13-alpine
    container_name: postgres-trackly-bd
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trackly-db
    ports:
      - "5432:5432"
    networks:
      - my-network
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: best-password
    command: server --console-address ":9001" /data
    networks:
      - my-network
  #   Сервис для вашего Go-приложения
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      - postgres-trackly-bd
      - minio

    ports:
      - "8080:8080"
    networks:
      - my-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trackly-db

# Настройка volumes и networks
networks:
  my-network:
    driver: bridge